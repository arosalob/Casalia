<!doctype html>
<html lang="en" class="scroll-smooth">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="/favicon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CASALIA</title>
  <meta name="description" content="Casalia is a platform for house price prediction using AI." />
  <meta name="author" content="Arcomus" />
  <meta name="application-name" content="CASALIA" />
  <script>
    (function() {
      try {
        var localTheme = localStorage.getItem('theme');
        var isDark = localTheme === 'dark' || ((localTheme === 'system' || !localTheme) && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.add('light');
        }
      } catch (e) {}
    })();
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
